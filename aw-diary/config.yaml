# ActivityWatch Diary Configuration

activitywatch:
  host: "172.18.208.1"
  port: 5600

obsidian:
  vault_path: "/home/wuyu/obsidian-vault"
  daily_notes_dir: "Daily Notes"
  filename_template: "轨迹日记-{date}.md"

